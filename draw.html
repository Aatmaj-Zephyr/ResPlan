```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Floor Plan WKT Editor</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;

    height:100vh;
}

#left{
    width:260px;

    background:#fafafa;

</style>
</head>

<body>

<div id="left">

<h3>Floor Editor</h3>

<div id="categoryButtons"></div>

<hr>

<button id="finishBtn">Finish Polygon</button>
<button id="undoBtn">Undo (Ctrl/Cmd+Z)</button>

<div class="row">
<button id="zoomOutBtn">Zoom -</button>
<button id="zoomResetBtn">100%</button>
<button id="zoomInBtn">Zoom +</button>
</div>
<span id="zoomLabel">Zoom: 100%</span>

<button id="exportBtn">Export JSON</button>
<button id="clearBtn">Clear All</button>

<div class="info">
Click to add points.<br>
Drag vertices to edit.<br>
Finish Polygon when done (or press Enter).
</div>

<textarea id="output"></textarea>

</div>

<div id="right">
<canvas id="canvas"></canvas>
</div>

<script>

const GRID = 10;
const ZOOM_MIN = 0.4;
const ZOOM_MAX = 4;
const ZOOM_STEP = 0.1;
const HISTORY_LIMIT = 200;

const CATEGORY_COLORS = {
    living: "#d9d9d9",
    bedroom: "#66c2a5",
    bathroom: "#fc8d62",
    kitchen: "#8da0cb",
    door: "#e78ac3",
    window: "#a6d854",
    wall: "#ffd92f",
    front_door: "#a63603",
    balcony: "#b3b3b3",
    storage: "#a37c52",
    stair: "#9e9ac8"
};

const CATEGORIES = Object.keys(CATEGORY_COLORS);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width =
        window.innerWidth - 260;

    canvas.height =
        window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const layout = {
    living: [],
    bedroom: [],
    bathroom: [],
    kitchen: [],
    wall: [],
    door: [],
    window: [],
    front_door: [],
    balcony: [],
    storage: [],
    stair: [],
    id: 14433,
    wall_depth: 4.5
};

let currentType = "bedroom";
let currentPolygon = [];
let pointer = null;
let hoveredVertex = null;
let dragging = null;
let suppressClick = false;
let mouseDownVertex = null;
let didDragVertex = false;
let zoomLevel = 1;
let dragStartSnapshot = null;
let offsetX = 0;
let offsetY = 0;

let isPanning = false;
let panStart = null;
const historyStack = [];

const PICK_RADIUS = 12;

const categoryButtonsHost = document.getElementById("categoryButtons");
const buttons = {};

for(const category of CATEGORIES){
    const button = document.createElement("button");
    button.id = `${category}Btn`;
    button.textContent = category.replace(/_/g," ");
    button.style.borderLeft = `8px solid ${CATEGORY_COLORS[category]}`;
    categoryButtonsHost.appendChild(button);
    buttons[category] = button;
}

function updateButtons(){

    Object.values(buttons)
        .forEach(b => b.classList.remove("active"));

    buttons[currentType]
        .classList.add("active");
}

updateButtons();

for(const category of CATEGORIES){
    buttons[category].onclick = () => {
        currentType = category;
        updateButtons();
    };
}

function snap(v){
    return Math.round(v / GRID) * GRID;
}

function drawGrid(){

    const maxX = canvas.width / zoomLevel;
    const maxY = canvas.height / zoomLevel;

    ctx.strokeStyle="#eee";
    ctx.lineWidth=1;

    for(let x=0;x<maxX;x+=GRID){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,maxY);
        ctx.stroke();
    }

    for(let y=0;y<maxY;y+=GRID){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(maxX,y);
        ctx.stroke();
    }
}

function drawPointerGuides(){

    if(!pointer)
        return;

    const x = pointer.x;
    const y = pointer.y;

    ctx.save();

    ctx.setLineDash([6,4]);
    ctx.strokeStyle="#90a4ae";
    ctx.lineWidth=1;

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height/zoomLevel);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width/zoomLevel,y);
    ctx.stroke();

    ctx.setLineDash([]);
    ctx.fillStyle="#455a64";
    ctx.font="12px Arial";
    ctx.fillText(`x: ${x}`,Math.min(x+8,canvas.width-45),14);
    ctx.fillText(`y: ${y}`,8,Math.max(y-8,14));

    ctx.restore();
}

function drawVertex(point,color){

    const isHighlighted =
        point===hoveredVertex ||
        point===dragging;

    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(point.x,point.y,5,0,Math.PI*2);
    ctx.fill();

    if(isHighlighted){
        ctx.strokeStyle="#ffffff";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(point.x,point.y,8,0,Math.PI*2);
        ctx.stroke();

        ctx.strokeStyle="#d32f2f";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(point.x,point.y,10,0,Math.PI*2);
        ctx.stroke();
    }
}

const colors = CATEGORY_COLORS;

function getDistance(a,b){
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    return Math.sqrt(dx*dx + dy*dy);
}

function getAngleBetween(v1,v2){

    const mag1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
    const mag2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);

    if(mag1===0 || mag2===0)
        return null;

    const dot = v1.x*v2.x + v1.y*v2.y;
    const cosTheta = Math.max(-1,Math.min(1,dot/(mag1*mag2)));
    return Math.acos(cosTheta) * 180 / Math.PI;
}

function drawAnnotation(text,x,y,color){

    ctx.save();
    ctx.font="12px Arial";
    const paddingX = 4;
    const paddingY = 3;
    const width = ctx.measureText(text).width + paddingX*2;
    const height = 16;

    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.fillRect(x - width/2,y - height/2,width,height);

    ctx.strokeStyle="rgba(120,120,120,0.5)";
    ctx.lineWidth=1;
    ctx.strokeRect(x - width/2,y - height/2,width,height);

    ctx.fillStyle=color || "#455a64";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(text,x,y+0.5);

    ctx.restore();
}

function drawSegmentLength(a,b,color){

    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const mag = Math.sqrt(dx*dx + dy*dy) || 1;

    const offsetX = -dy / mag * 12;
    const offsetY = dx / mag * 12;

    drawAnnotation(
        `${getDistance(a,b).toFixed(1)} px`,
        mx + offsetX,
        my + offsetY,
        color
    );
}

function drawVertexAngle(prev,curr,next,color){

    const v1 = {
        x: prev.x - curr.x,
        y: prev.y - curr.y
    };

    const v2 = {
        x: next.x - curr.x,
        y: next.y - curr.y
    };

    const angle = getAngleBetween(v1,v2);

    if(angle===null)
        return;

    drawAnnotation(
        `${angle.toFixed(1)}°`,
        curr.x,
        curr.y - 18,
        color
    );
}

function drawClosedPolygonAnnotations(points,color){

    if(points.length < 2)
        return;

    for(let i=0;i<points.length;i++){

        const a = points[i];
        const b = points[(i+1)%points.length];
        drawSegmentLength(a,b,color);
    }

    if(points.length < 3)
        return;

    for(let i=0;i<points.length;i++){

        const prev = points[(i-1+points.length)%points.length];
        const curr = points[i];
        const next = points[(i+1)%points.length];

        drawVertexAngle(prev,curr,next,color);
    }
}

function drawOpenPolylineAnnotations(points,color){

    if(points.length < 2)
        return;

    for(let i=0;i<points.length-1;i++){

        drawSegmentLength(
            points[i],
            points[i+1],
            color
        );
    }

    if(points.length < 3)
        return;

    for(let i=1;i<points.length-1;i++){
        drawVertexAngle(
            points[i-1],
            points[i],
            points[i+1],
            color
        );
    }
}

function drawPreviewFromLastPoint(){

    if(!pointer || currentPolygon.length===0)
        return;

    const last = currentPolygon[currentPolygon.length-1];

    ctx.save();
    ctx.setLineDash([4,4]);
    ctx.strokeStyle="#9e9e9e";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(last.x,last.y);
    ctx.lineTo(pointer.x,pointer.y);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle="rgba(117,117,117,0.5)";
    ctx.beginPath();
    ctx.arc(pointer.x,pointer.y,5,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    drawSegmentLength(last,pointer,"#616161");

    if(currentPolygon.length>=2){
        const prev = currentPolygon[currentPolygon.length-2];
        drawVertexAngle(prev,last,pointer,"#616161");
    }else{

        const absolute =
            Math.atan2(
                pointer.y - last.y,
                pointer.x - last.x
            ) * 180 / Math.PI;

        drawAnnotation(
            `${absolute.toFixed(1)}°`,
            last.x,
            last.y - 18,
            "#616161"
        );
    }
}

function drawPolygon(points,color){

    if(points.length===0)
        return;

    const fillColor = color || "#bdbdbd";
    ctx.fillStyle = hexToRgba(fillColor, 0.35);
    ctx.beginPath();
    ctx.moveTo(points[0].x,points[0].y);
    for(let i=1;i<points.length;i++){
        ctx.lineTo(points[i].x,points[i].y);
    }
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle=color;
    ctx.lineWidth=2;

    ctx.beginPath();

    ctx.moveTo(
        points[0].x,
        points[0].y
    );

    for(let i=1;i<points.length;i++){

        ctx.lineTo(
            points[i].x,
            points[i].y
        );
    }

    ctx.closePath();
    ctx.stroke();

    points.forEach(p=> drawVertex(p,color));
    drawClosedPolygonAnnotations(points,"#37474f");
}

function hexToRgba(hex, alpha){

    const clean = hex.replace("#","");
    const full = clean.length === 3
        ? clean.split("").map(ch => ch + ch).join("")
        : clean;

    const value = parseInt(full, 16);
    const r = (value >> 16) & 255;
    const g = (value >> 8) & 255;
    const b = value & 255;

    return `rgba(${r},${g},${b},${alpha})`;
}

function drawCurrent(){

    if(currentPolygon.length===0)
        return;

    ctx.strokeStyle="red";
    ctx.lineWidth=2;

    ctx.beginPath();

    ctx.moveTo(
        currentPolygon[0].x,
        currentPolygon[0].y
    );

    for(let i=1;i<currentPolygon.length;i++){

        ctx.lineTo(
            currentPolygon[i].x,
            currentPolygon[i].y
        );
    }

    ctx.stroke();

    currentPolygon.forEach(p=> drawVertex(p,"red"));
    drawOpenPolylineAnnotations(currentPolygon,"#37474f");
    drawPreviewFromLastPoint();
}

function render(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(offsetX,offsetY);
    ctx.scale(zoomLevel,zoomLevel);
    drawGrid();
    drawPointerGuides();

    Object.keys(layout)
        .forEach(type=>{

        if(!Array.isArray(layout[type]))
            return;

        layout[type].forEach(poly=>{

            drawPolygon(
                poly,
                colors[type]
            );
        });
    });

    drawCurrent();

    ctx.restore();
}

render();

function cloneState(){
    return {
        layout: JSON.parse(JSON.stringify(layout)),
        currentPolygon: JSON.parse(JSON.stringify(currentPolygon)),
        currentType
    };
}

function applyState(state){

    for(const category of CATEGORIES){
        layout[category] = state.layout[category] || [];
    }
    layout.id = state.layout.id;
    layout.wall_depth = state.layout.wall_depth;

    currentPolygon = state.currentPolygon || [];
    currentType = state.currentType || currentType;
    updateButtons();
}

function pushHistory(){
    historyStack.push(cloneState());
    if(historyStack.length > HISTORY_LIMIT)
        historyStack.shift();
}

function pushSnapshot(snapshot){
    if(!snapshot)
        return;
    historyStack.push(snapshot);
    if(historyStack.length > HISTORY_LIMIT)
        historyStack.shift();
}

function undo(){

    if(historyStack.length===0)
        return;

    const prev = historyStack.pop();
    applyState(prev);

    hoveredVertex = null;
    dragging = null;
    pointer = null;
    mouseDownVertex = null;
    didDragVertex = false;
    suppressClick = false;
    dragStartSnapshot = null;

    render();
}
function getWorldPosition(e,snapToGrid=false){

    const rect = canvas.getBoundingClientRect();

    const x =
        (e.clientX - rect.left - offsetX)
        / zoomLevel;

    const y =
        (e.clientY - rect.top - offsetY)
        / zoomLevel;

    if(!snapToGrid)
        return {x,y};

    return {
        x:snap(x),
        y:snap(y)
    };
}
function setZoom(nextZoom){

    zoomLevel = Math.max(
        ZOOM_MIN,
        Math.min(ZOOM_MAX,nextZoom)
    );

    document.getElementById("zoomLabel")
        .textContent = `Zoom: ${Math.round(zoomLevel*100)}%`;

    render();
}

canvas.addEventListener("click",e=>{

    if(dragging)
        return;

    if(mouseDownVertex && !didDragVertex){

        pushHistory();

        currentPolygon.push({
            x: mouseDownVertex.x,
            y: mouseDownVertex.y
        });

        mouseDownVertex = null;
        suppressClick = false;
        render();
        return;
    }

    if(didDragVertex){
        mouseDownVertex = null;
        didDragVertex = false;
        suppressClick = false;
        return;
    }

    if(suppressClick){
        suppressClick=false;
        return;
    }

    const pos = getWorldPosition(e,true);

    pushHistory();

    currentPolygon.push({
        x: pos.x,
        y: pos.y
    });

    mouseDownVertex = null;
    didDragVertex = false;

    render();
});

function finishCurrentPolygon(){

    if(currentPolygon.length<3)
        return;

    pushHistory();

    layout[currentType]
        .push(
            JSON.parse(
                JSON.stringify(
                    currentPolygon
                )
            )
        );

    currentPolygon=[];
    hoveredVertex=null;

    render();
}

document
.getElementById("finishBtn")
.onclick=()=>{
    finishCurrentPolygon();
};

document
.getElementById("clearBtn")
.onclick=()=>{

    pushHistory();

    for(const category of CATEGORIES){
        layout[category]=[];
    }

    currentPolygon=[];

    render();
};

function getAllVertices(){

    const all=[];
    const allTypes=["bedroom","wall","door","window"];

    for(const type of allTypes){
        for(const poly of layout[type]){
            for(const vertex of poly){
                all.push(vertex);
            }
        }
    }

    for(const vertex of currentPolygon){
        all.push(vertex);
    }

    return all;
}

function findVertex(x,y){

    let closest = null;
    let minDist = Infinity;

    for(const vertex of getAllVertices()){

        const dx = vertex.x - x;
        const dy = vertex.y - y;
        const dist = Math.sqrt(dx*dx+dy*dy);

        if(dist < PICK_RADIUS && dist < minDist){
            minDist = dist;
            closest = vertex;
        }
    }

    return closest;
}

canvas.addEventListener(
"mousedown",
e=>{
if(e.button===1){

    isPanning=true;

    panStart={
        x:e.clientX,
        y:e.clientY,
        offsetX,
        offsetY
    };

    return;
}
if(isPanning){

    offsetX =
        panStart.offsetX +
        (e.clientX - panStart.x);

    offsetY =
        panStart.offsetY +
        (e.clientY - panStart.y);

    render();
    return;
}
        const world = getWorldPosition(e,false);

    dragging=
      findVertex(
                world.x,
                world.y
      );

        dragStartSnapshot = dragging ? cloneState() : null;

        mouseDownVertex = dragging;
        didDragVertex = false;
        hoveredVertex = dragging;
        suppressClick = !!dragging;

        render();
});

canvas.addEventListener(
"mousemove",
e=>{
if(isPanning){

    offsetX =
        panStart.offsetX +
        (e.clientX - panStart.x);

    offsetY =
        panStart.offsetY +
        (e.clientY - panStart.y);

    render();
    return;
}
    const world = getWorldPosition(e,false);
    const snapped = {
        x: snap(world.x),
        y: snap(world.y)
    };

    pointer = {
        x: snapped.x,
        y: snapped.y
    };

    hoveredVertex = findVertex(
        world.x,
        world.y
    );

    if(!dragging){
        render();
        return;
    }

        const nextX = snapped.x;
        const nextY = snapped.y;

        if(
                dragging.x!==nextX ||
                dragging.y!==nextY
        ){
                didDragVertex = true;
        }

    dragging.x=
            nextX;

    dragging.y=
            nextY;

    render();
});

canvas.addEventListener(
"mouseup",
()=>{
isPanning=false;
panStart=null;
    if(didDragVertex){
        pushSnapshot(dragStartSnapshot);
    }

    dragging=null;
    dragStartSnapshot=null;
});

canvas.addEventListener(
"mouseleave",
()=>{
    dragging=null;
    dragStartSnapshot=null;
    mouseDownVertex=null;
    didDragVertex=false;
    hoveredVertex=null;
    pointer=null;
    render();
});

document.addEventListener("keydown",e=>{

    const key = (e.key || "").toLowerCase();

    if((e.ctrlKey || e.metaKey) && key==="z"){
        e.preventDefault();
        undo();
        return;
    }

    if(key==="+"){
        e.preventDefault();
        setZoom(zoomLevel + ZOOM_STEP);
        return;
    }

    if(key==="-"){
        e.preventDefault();
        setZoom(zoomLevel - ZOOM_STEP);
        return;
    }

    if(e.key!=="Enter")
        return;

    const tag =
        (e.target && e.target.tagName) || "";

    if(
        tag==="TEXTAREA" ||
        tag==="INPUT" ||
        (e.target && e.target.isContentEditable)
    ){
        return;
    }

    e.preventDefault();
    finishCurrentPolygon();
});

canvas.addEventListener("wheel",e=>{

    e.preventDefault();

    const delta = e.deltaY < 0
        ? ZOOM_STEP
        : -ZOOM_STEP;

    setZoom(zoomLevel + delta);
},{passive:false});

document.getElementById("undoBtn").onclick=()=>{
    undo();
};

document.getElementById("zoomInBtn").onclick=()=>{
    setZoom(zoomLevel + ZOOM_STEP);
};

document.getElementById("zoomOutBtn").onclick=()=>{
    setZoom(zoomLevel - ZOOM_STEP);
};

document.getElementById("zoomResetBtn").onclick=()=>{
    setZoom(1);
};

function polygonToWKT(points){

    const coords =
      [...points,points[0]]
      .map(
        p =>
        `${p.x} ${p.y}`
      )
      .join(",");

    return `((${coords}))`;
}

function multipolygonToWKT(polys){

    if(polys.length===0)
        return "MULTIPOLYGON EMPTY";

    return `MULTIPOLYGON (${polys
        .map(
            p =>
            polygonToWKT(p)
        )
        .join(",")})`;
}

document
.getElementById("exportBtn")
.onclick=()=>{

    const result = {

        ...Object.fromEntries(
            CATEGORIES.map(category => [
                category,
                multipolygonToWKT(layout[category])
            ])
        ),

        id: layout.id,

        wall_depth:
            layout.wall_depth
    };

        const text = JSON.stringify(
                result,
                null,
                2
        );

        document
            .getElementById("output")
            .value = text;

        const now = new Date();
        const pad = n => String(n).padStart(2,"0");
        const stamp =
                `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_`+
                `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;

        const filename = `plan_export_${stamp}.json`;
        const blob = new Blob([text],{type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
};

</script>
</body>
</html>
