<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Floor Plan Editor</title>
<style>
:root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --card:#f1f5f9;
    --text:#0f172a;
    --muted:#64748b;
    --accent:#2563eb;
    --accentHover:#1d4ed8;
    --danger:#ef4444;
    --border:#e2e8f0;
}

body{
    margin:0;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    display:flex;
    height:100vh;
    background:var(--bg);
    color:var(--text);
}

/* LEFT PANEL */
#left{
    width:300px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:16px;
    box-sizing:border-box;
    overflow:auto;
}

/* Title */
h3{
    margin:6px 0 14px;
    font-weight:650;
    letter-spacing:0.3px;
}

/* Buttons */
button{
    width:100%;
    padding:10px 12px;
    margin-bottom:8px;
    cursor:pointer;
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--card);
    color:var(--text);
    font-size:13px;

    transition: all 0.18s ease;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
}

/* ✨ STRONG HOVER EFFECT */
button:hover{
    background:white;
    border-color:#cbd5e1;
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* click feedback */
button:active{
    transform:translateY(0px) scale(0.98);
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* active tool button */
button.active{
    background:var(--accent);
    color:white;
    border-color:var(--accent);
    box-shadow:0 10px 20px rgba(37,99,235,0.25);
}

button.active:hover{
    background:var(--accentHover);
}

/* danger button */
#clearBtn{
    background:#fff5f5;
    border-color:#fecaca;
    color:var(--danger);
}

#clearBtn:hover{
    background:#fee2e2;
    border-color:#fca5a5;
}

/* grouped buttons */
.row{
    display:flex;
    gap:8px;
}

.row button{
    flex:1;
}

/* canvas area */
#right{
    flex:1;
    position:relative;
    background:linear-gradient(180deg,#f8fafc,#eef2ff);
}

canvas{
    display:block;
    margin:18px;
    border-radius:14px;
    background:white;
    border:1px solid var(--border);
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    transition: box-shadow 0.2s ease;
}

/* subtle hover glow for canvas */
canvas:hover{
    box-shadow:0 16px 40px rgba(0,0,0,0.12);
}
.switch {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 22px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.25s;
  border-radius: 999px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 2px;
  top: 2px;
  background-color: white;
  transition: 0.25s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #1e88e5;
}

input:checked + .slider:before {
  transform: translateX(20px);
}
/* info box */
.info{
    margin-top:10px;
    padding:10px;
    font-size:12px;
    color:var(--muted);
    background:#f8fafc;
    border:1px solid var(--border);
    border-radius:10px;
    line-height:1.5;
}
/* textarea */
textarea{
    width:100%;
    height:180px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:white;
    color:var(--text);
    padding:10px;
    font-size:12px;
    resize:none;
    box-shadow:inset 0 1px 2px rgba(0,0,0,0.04);
}

/* zoom label */
#zoomLabel{
    display:block;
    margin:8px 0;
    font-size:12px;
    color:var(--muted);
}

/* divider */
hr{
    border:none;
    border-top:1px solid var(--border);
    margin:14px 0;
}

/* OPTIONAL: category buttons (if JS creates them) */
#categoryButtons button{
    text-align:left;
}

#categoryButtons button:hover{
    background:#eef2ff;
    border-color:#c7d2fe;
}
/* SETTINGS PANEL ITEMS */
.setting-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;

    margin:10px 0;
    padding:10px 12px;

    background:#f8fafc;
    border:1px solid var(--border);
    border-radius:12px;

    transition:all .2s ease;
}

.setting-row:hover{
    background:white;
    border-color:#cbd5e1;
    box-shadow:0 6px 16px rgba(0,0,0,.05);
}

.setting-label{
    font-size:13px;
    font-weight:500;
    color:var(--text);
}

/* MODERN TOGGLE */
.switch{
    position:relative;
    width:50px;
    height:28px;
    flex-shrink:0;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    cursor:pointer;
    background:#cbd5e1;
    border-radius:999px;
    transition:.25s;
}

.slider:before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    left:3px;
    top:3px;
    border-radius:50%;
    background:white;
    box-shadow:0 2px 6px rgba(0,0,0,.18);
    transition:.25s;
}

input:checked + .slider{
    background:var(--accent);
}

input:checked + .slider:before{
    transform:translateX(22px);
}

.switch:hover .slider{
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

/* GRID SELECT */
#gridSizeSelect{
    width:90px;
    padding:8px 10px;

    border:1px solid var(--border);
    border-radius:10px;

    background:white;
    color:var(--text);
    font-size:13px;
    font-weight:500;

    cursor:pointer;
    outline:none;

    transition:all .18s ease;
}

#gridSizeSelect:hover{
    border-color:#cbd5e1;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}

#gridSizeSelect:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}
</style>
</head>

<body>

<div id="left">

<h3>🏗 Floor Editor</h3>

<div id="categoryButtons"></div>

<hr>



<button id="homeBtn">🏠 Home View</button>



<span id="zoomLabel">Zoom: 100%</span>

<button id="exportBtn">Export JSON</button>
<button id="clearBtn"">Clear All</button>
<button id="loadBtn">Load</button>
<input type="file" id="fileInput" accept=".json" style="display:none" />

<div class="setting-row">
    <span class="setting-label">Annotations</span>
    <label class="switch">
        <input type="checkbox" id="toggleAnnotationsBtn" checked>
        <span class="slider"></span>
    </label>
</div>

<div class="setting-row">
    <span class="setting-label">Snap to Grid</span>
    <label class="switch">
        <input type="checkbox" id="toggleSnapBtn" checked>
        <span class="slider"></span>
    </label>
</div>

<div class="setting-row">
    <span class="setting-label">Grid Size</span>
    <select id="gridSizeSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
    </select>
</div>
<div class="info">
Click to add points<br>
Drag vertices to edit<br>
Enter → finish polygon<br>
Delete → remove shape
Control Z → undo last action
Please press enter and not manually go to last point to complete the polygon.
</div>

<textarea id="output"></textarea>

</div>

<div id="right">
<canvas id="canvas"></canvas>
</div>

<script src="draw.js"></script>
</body>
</html>
